<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Panchu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body { color: #fff; overflow: hidden; }

/* Background Image */
.bg-img {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  animation: zoom 20s ease-in-out infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* Overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* Intro screen */
.intro {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1.5rem;
  z-index: 5;
  animation: fadeOut 3s forwards;
  animation-delay: 2s;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* Main container */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

h1 { font-size: 2.2rem; margin-bottom: 10px; }
p { font-size: 1.1rem; margin-bottom: 20px; }

button {
  padding: 12px 24px;
  border-radius: 30px;
  border: none;
  background: #fff;
  color: #ff6b81;
  cursor: pointer;
  transition: 0.3s;
}

button:hover { transform: scale(1.1); }

.hidden { display: none; }

/* Card */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 20px;
  max-width: 320px;
  margin-top: 20px;
}

/* Final message */
.big-love {
  font-size: 2.2rem;
  margin-top: 20px;
  text-align: center;
}

/* Shake effect */
.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  75% { transform: translate(2px, 2px); }
  100% { transform: translate(0px, 0px); }
}

/* Hearts */
.heart {
  position: fixed;
  color: red;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

.countdown {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="intro">Something special is loading for you ❤️</div>

<img class="bg-img" src="https://i.postimg.cc/0QfQTP9C/P.jpg">
<div class="overlay"></div>

<div class="container">
  <h1>Happy Engagement Anniversary, Panchu ❤️</h1>
  <div id="timer" class="countdown"></div>
  <p>Tap below... I made something just for you</p>

  <button onclick="startTyping()">From the Heart</button>

  <div id="message" class="hidden card">
    <h2>To My Panchu 💕</h2>
    <p id="typedText"></p>

    <button id="finalBtn" class="hidden" onclick="finalReveal()">
      I love you forever ❤️
    </button>
  </div>

  <div id="finalMessage" style="
  display:none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2.2rem;
  text-align: center;
  color: white;
  z-index: 9999;
  font-weight: bold;
"></div>
</div>

<script>

/* Typing Message */
const text = `From the day we said yes to forever,
my life changed in the most beautiful way.

Every moment with you feels special,
and today is just a reminder of
how lucky I am to have you.

Panchu, you are my happiness,
my peace, and my everything ❤️

Here's to us, to love, and to forever.`;

function startTyping() {
  document.getElementById('message').classList.remove('hidden');
  let i = 0;

  function type() {
    if (i < text.length) {
      document.getElementById('typedText').innerHTML += 
        text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
      i++;
      setTimeout(type, 35);
    } else {
      document.getElementById('finalBtn').classList.remove('hidden');
    }
  }

  type();
  generateHearts();
}

/* Final Reveal */
function finalReveal() {
  const finalEl = document.getElementById('finalMessage');
  finalEl.classList.remove('hidden');
  finalEl.innerHTML = "";

  const message = "I LOVE YOU FOREVER PANCHU ❤️";
  let i = 0;

  function typeFinal() {
    if (i < message.length) {
      finalEl.innerHTML += message.charAt(i);
      i++;
      setTimeout(typeFinal, 60);
    } else {
      document.body.classList.add('shake');
      setTimeout(() => document.body.classList.remove('shake'), 500);
    }
  }

  typeFinal();
  generateHearts();
}

/* Hearts */
function finalReveal() {
  const finalEl = document.getElementById('finalMessage');

  finalEl.style.display = "block";
  finalEl.innerHTML = "";

  const message = "I LOVE YOU FOREVER PANCHU ❤️";
  let i = 0;

  function typeFinal() {
    if (i < message.length) {
      finalEl.innerHTML += message.charAt(i);
      i++;
      setTimeout(typeFinal, 60);
    } else {
      // shake effect AFTER text appears
      document.body.classList.add('shake');
      setTimeout(() => document.body.classList.remove('shake'), 500);
    }
  }

  typeFinal();
  generateHearts();
}

/* Engagement Timer */
const engagementDate = new Date("2024-04-26");

function updateTimer() {
  const now = new Date();
  const diff = now - engagementDate;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const years = Math.floor(days / 365);
  const remainingDays = days % 365;

  document.getElementById('timer').innerText =
    `It's been ${years} year(s) and ${remainingDays} day(s) since we said yes ❤️`;
}

updateTimer();

</script>

</body>
</html>
